name: interop

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  interop:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
        with:
          peers: "true"
      - name: build wolfSSL (all features, client + server for both directions)
        run: |
          set -eux
          git clone --depth 1 https://github.com/wolfSSL/wolfssl "$RUNNER_TEMP/wolfssl"
          cd "$RUNNER_TEMP/wolfssl"
          ./autogen.sh
          ./configure --enable-tls13 --enable-psk --enable-curve25519 \
            --enable-ecc --enable-ed25519 --enable-dilithium --enable-mlkem \
            --enable-experimental CFLAGS=-DWOLFSSL_STATIC_PSK
          make -j"$(nproc)" examples/server/server examples/client/client
      - name: build mbedTLS ssl_server2 + ssl_client2 (best-effort)
        run: |
          set -eux
          git clone --depth 1 --branch mbedtls-3.6.2 \
            https://github.com/Mbed-TLS/mbedtls "$RUNNER_TEMP/mbedtls" || exit 0
          cmake -S "$RUNNER_TEMP/mbedtls" -B "$RUNNER_TEMP/mbedtls/b" \
            -DENABLE_TESTING=Off >/dev/null 2>&1 || exit 0
          make -C "$RUNNER_TEMP/mbedtls/b" -j"$(nproc)" ssl_server2 ssl_client2 \
            >/dev/null 2>&1 || exit 0
      - name: make interop (our client + server vs OpenSSL + wolfSSL + mbedTLS)
        run: |
          WS="$RUNNER_TEMP/wolfssl"
          export WOLFSSL_DIR="$WS"
          export WOLFSSL_SERVER="$WS/examples/server/server"
          export WOLFSSL_PQC_SERVER="$WS/examples/server/server"
          MBS="$RUNNER_TEMP/mbedtls/b/programs/ssl/ssl_server2"
          MBC="$RUNNER_TEMP/mbedtls/b/programs/ssl/ssl_client2"
          [ -x "$MBS" ] && export MBEDTLS_SERVER="$MBS"
          [ -x "$MBC" ] && export MBEDTLS_CLIENT="$MBC"
          make interop
