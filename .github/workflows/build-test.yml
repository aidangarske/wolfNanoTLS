name: build-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: linux-x86_64 }
          - { os: ubuntu-24.04-arm, label: linux-arm64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - if: runner.os == 'Linux'
        uses: ./.github/actions/setup
      - uses: ./.github/actions/wolfssl-checkout
      - name: make test (all self-test suites, includes wn_x509 vs wolfSSL diff)
        run: make test
      - name: X.509 cert tests -- wolfSSL asn.c backend (default)
        run: make certmldsatest certnegtest certnegpintest certgentest
      - name: X.509 cert tests -- native wn_x509 backend (X509_LITE=1)
        run: make certmldsatest certnegtest certnegpintest certgentest X509_LITE=1
      - name: X.509 clockless tier compiles (WOLFNANO_NO_X509_TIME)
        run: make cert-notime-build
      - name: configs-build (compile every starter template)
        run: make configs-build
