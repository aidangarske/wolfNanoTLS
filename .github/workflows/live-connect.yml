name: live-connect

# Not run on pull_request: a live external endpoint must not gate PRs on a
# transient network blip. Runs on main, on a daily schedule, and on demand.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

# Live TLS 1.3 handshake against a real public HTTPS endpoint. Uses Let's
# Encrypt's purpose-built validation host (stable root: ISRG Root X1, valid to
# 2035) so the test is reproducible; the example itself is host-agnostic.
jobs:
  https:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HOST: valid-isrgrootx1.letsencrypt.org
      ROOT_URL: https://letsencrypt.org/certs/isrgrootx1.der
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/wolfssl-checkout
      - name: build live HTTPS client example
        run: make example-https
      - name: fetch trust anchor (ISRG Root X1)
        run: curl -fsSL --retry 3 "$ROOT_URL" -o isrgrootx1.der
      - name: live TLS 1.3 GET (retry on transient network)
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "attempt $attempt -> $HOST"
            if ./build/example_client_https "$HOST" isrgrootx1.der 443; then
              exit 0
            fi
            sleep 5
          done
          echo "live connect failed after 3 attempts"
          exit 1
