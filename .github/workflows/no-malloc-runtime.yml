name: no-malloc-runtime

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nomalloc:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/wolfssl-checkout
      - name: no-malloc test subset (heap-free paths only)
        # asn.c cert parsing, RSA cert chains, and ML-DSA sign need heap, so the
        # no-malloc build runs the PSK/floor/ML-KEM/hybrid suites + the native
        # wn_x509 ECDSA cert-verify.
        run: make test-core mlkemtest hybridtest mockhybridtest x509verifytest servertest MEM=nomalloc && make servercertnomalloc
      - name: runtime allocation probe (crypto path + full PSK handshake)
        run: make noalloc-crypto noalloc-handshake
