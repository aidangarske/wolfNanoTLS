name: stack-bounds

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  stack:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: enforce stack budget (default, worst-case on-stack buffers)
        run: make stackcheck
      - name: enforce stack budget (WOLFSSL_SMALL_STACK, buffers on heap)
        run: make stackcheck MEM=smallstack
      - name: largest stack frames (informational)
        if: always()
        run: |
          { echo '## Largest stack frames'; echo '```';
            cat build/su/*.su 2>/dev/null \
              | sort -t"$(printf '\t')" -k2 -nr | head -25;
            echo '```'; } >> "$GITHUB_STEP_SUMMARY"
