name: examples

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Build every example against pinned / latest-stable / master wolfSSL so a
# version bump cannot silently regress them, and run the PSK example end-to-end
# against openssl s_server. The HTTPS example runs in live-connect.yml; the
# cert / PQC connect paths are also exercised by interop.yml.
jobs:
  discover:
    uses: ./.github/workflows/_discover-wolfssl.yml

  examples:
    needs: discover
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/wolfssl-checkout
        with:
          ref: ${{ matrix.ref }}
      - name: build examples (wolfssl ${{ matrix.ref }})
        run: |
          make example example-cert example-https
          if [ -f wolfssl/wolfcrypt/src/wc_mlkem.c ]; then
            make example-pqc
          else
            echo "::notice::wolfSSL ${{ matrix.ref }} predates wc_mlkem; skipping example-pqc"
          fi
      - name: run PSK example against openssl s_server
        run: |
          set -e
          PORT=14470
          openssl s_server -psk 000102030405060708090a0b0c0d0e0f \
            -psk_identity Client_identity -nocert -tls1_3 -rev \
            -accept "$PORT" -quiet >/tmp/sserver.log 2>&1 &
          spid=$!
          for i in $(seq 1 50); do
            nc -z 127.0.0.1 "$PORT" 2>/dev/null && break
            sleep 0.1
          done
          ./build/example_client 127.0.0.1 "$PORT"
          rc=$?
          kill "$spid" 2>/dev/null || true
          exit $rc
