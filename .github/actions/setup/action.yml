name: setup
description: Install wolfNanoTLS build/test toolchains (host C; optional cross + peers).

inputs:
  arm:
    description: "install a complete arm-none-eabi toolchain (newlib) for cross builds"
    required: false
    default: "false"
  peers:
    description: "install OpenSSL + build deps for mbedTLS/wolfSSL interop peers"
    required: false
    default: "false"
  qemu:
    description: "install Linux cross toolchains + qemu-user-static for cross-arch test execution"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Base host toolchain
      shell: bash
      run: |
        set -eux
        # preinstalled third-party repos (microsoft/azure) intermittently 403 and
        # fail apt-get update; we do not need them for the toolchain
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                   /etc/apt/sources.list.d/azure-cli.list \
                   /etc/apt/sources.list.d/azure-cli.sources
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends build-essential clang make
    - name: Arm cross toolchain (newlib)
      if: inputs.arm == 'true'
      shell: bash
      run: sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi
    - name: Interop peers
      if: inputs.peers == 'true'
      shell: bash
      run: sudo apt-get install -y --no-install-recommends openssl libssl-dev autoconf automake libtool
    - name: QEMU cross toolchains
      if: inputs.qemu == 'true'
      shell: bash
      run: |
        set -eux
        sudo apt-get install -y --no-install-recommends \
          qemu-user-static \
          gcc-arm-linux-gnueabihf libc6-dev-armhf-cross \
          gcc-aarch64-linux-gnu libc6-dev-arm64-cross \
          gcc-riscv64-linux-gnu libc6-dev-riscv64-cross
