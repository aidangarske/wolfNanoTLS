name: minimal-build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  size:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Verified Cortex-M33 .text (ArmGNU 14.2) from the configs/ templates:
      # X25519 17.6K, P-256 25.2K, cert 60.8K. Budgets allow ~15% headroom for
      # CI's older arm-gcc; they fail loudly if the footprint regresses, keeping
      # the headline numbers honest.
      PSK_X25519_MAX: 20500
      PSK_P256_MAX: 29500
      CERT_MAX: 70000
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
        with:
          arm: "true"
      - name: build minimal Cortex-M33 clients
        run: ARM_GNU_BIN=/usr/bin TMPDIR="$RUNNER_TEMP" sh bench/footprint-clients.sh
      - name: assert footprint budgets
        run: |
          set -eu
          sz() { arm-none-eabi-size "$1" | awk 'NR==2{print $1}'; }
          psk=$(sz "$RUNNER_TEMP/wn_fpc/wn_psk.elf")
          p256=$(sz "$RUNNER_TEMP/wn_fpc/wn_psk_p256.elf")
          cert=$(sz "$RUNNER_TEMP/wn_fpc/wn_cert.elf")
          echo "wolfNano .text  PSK-X25519=$psk (max $PSK_X25519_MAX)  PSK-P256=$p256 (max $PSK_P256_MAX)  cert=$cert (max $CERT_MAX)"
          test "$psk"  -lt "$PSK_X25519_MAX"
          test "$p256" -lt "$PSK_P256_MAX"
          test "$cert" -lt "$CERT_MAX"
      - name: symbol audit (minimal X25519 PSK excludes everything it disables)
        run: |
          set -eu
          sh scripts/symbol_audit.sh arm-none-eabi-nm "$RUNNER_TEMP/wn_fpc/wn_psk.elf" \
            'wc_ecc' 'sp_256' 'sp_384' 'ed25519' 'wc_Rsa' 'Sha384' 'Sha512' \
            'Sha3_' 'hacha' 'Poly1305' 'AesCbc' 'Des3' 'wc_Md5' 'MlKem'
      - name: TLS-layer footprint (informational)
        run: sh bench/footprint.sh
      - name: crypto-scope footprint (informational)
        run: ARM_GNU_BIN=/usr/bin sh bench/footprint-min.sh
